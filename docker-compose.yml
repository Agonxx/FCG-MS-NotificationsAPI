services:

  notificationsapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notificationsapi
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__VHost=/
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - fcg-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-notifications
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fcg-network

networks:
  fcg-network:
    driver: bridge
